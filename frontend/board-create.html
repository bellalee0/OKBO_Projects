<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKBO - 게시글 작성</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/team-theme.css">
    <!-- 데모 모드를 위한 Mock 데이터 (배포 시에만 사용됨) -->
    <script src="/frontend/js/mockData.js"></script>
    <script src="/frontend/js/mockApi.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/frontend/main.html" style="text-decoration: none; color: inherit;">
                <div class="logo">⚾ OKBO</div>
            </a>
            <nav></nav>
        </div>
    </header>

    <div class="container form-container" style="max-width: 800px;">
        <h2>게시글 작성</h2>
        <form id="boardForm">
            <div class="form-group">
                <label for="title">제목 (최대 30자)</label>
                <input type="text" id="title" name="title" required maxlength="30" placeholder="제목을 입력하세요">
            </div>

            <div class="form-group">
                <label for="team">구단</label>
                <select id="team" name="team" required>
                    <option value="">구단을 선택하세요</option>
                    <option value="DOOSAN">두산 베어즈</option>
                    <option value="HANHWA">한화 이글스</option>
                    <option value="KIA">기아 타이거즈</option>
                    <option value="KT">KT 위즈</option>
                    <option value="KIWOOM">키움 히어로즈</option>
                    <option value="LG">LG 트윈스</option>
                    <option value="LOTTE">롯데 자이언츠</option>
                    <option value="NC">NC 다이노스</option>
                    <option value="SAMSUNG">삼성 라이온즈</option>
                    <option value="SSG">SSG 랜더스</option>
                </select>
            </div>

            <div class="form-group">
                <label for="content">내용 (최대 225자)</label>
                <textarea id="content" name="content" required maxlength="225" placeholder="내용을 입력하세요"></textarea>
            </div>

            <div class="flex gap-10">
                <button type="submit" class="btn btn-primary" style="flex: 1;">작성</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()" style="flex: 1;">취소</button>
            </div>
        </form>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        requireAuth();

        // 한글 팀 이름을 enum으로 변환
        function getTeamEnumFromName(teamName) {
            const teamEnumMap = {
                '두산 베어즈': 'DOOSAN',
                '한화 이글스': 'HANHWA',
                '기아 타이거즈': 'KIA',
                'KT 위즈': 'KT',
                '키움 히어로즈': 'KIWOOM',
                'LG 트윈스': 'LG',
                '롯데 자이언츠': 'LOTTE',
                'NC 다이노스': 'NC',
                '삼성 라이온즈': 'SAMSUNG',
                'SSG 랜더스': 'SSG'
            };
            return teamEnumMap[teamName] || teamName;
        }

        // 팀 테마 적용
        async function applyUserTeamTheme() {
            try {
                const userData = await apiGet('/users/my-page');
                const teamEnum = getTeamEnumFromName(userData.teamName);
                document.body.setAttribute('data-team', teamEnum);
                document.querySelector('.container')?.setAttribute('data-team', teamEnum);
            } catch (error) {
                console.error('팀 테마 적용 실패:', error);
            }
        }

        // 페이지 로드 시 팀 테마 적용
        (async function() {
            await applyUserTeamTheme();
        })();

        document.getElementById('boardForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const team = document.getElementById('team').value;
            const content = document.getElementById('content').value;

            try {
                const response = await apiPost('/boards', {
                    title,
                    team,
                    content
                });

                alert('게시글이 작성되었습니다.');
                window.location.href = `/frontend/board-detail.html?id=${response.id}`;
            } catch (error) {
                alert('게시글 작성 실패: ' + error.message);
            }
        });
    </script>
</body>
</html>

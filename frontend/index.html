<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKBO - 로그인</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/frontend/main.html" style="text-decoration: none; color: inherit;">
                <div class="logo">⚾ OKBO</div>
            </a>
            <nav>
                <a href="/frontend/main.html">게시글 보기</a>
                <a href="/frontend/index.html">로그인</a>
                <a href="/frontend/signup.html">회원가입</a>
            </nav>
        </div>
    </header>

    <div class="form-container">
        <h2>로그인</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required placeholder="example@email.com">
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">로그인</button>
        </form>

        <div class="text-center mt-20">
            <p>계정이 없으신가요? <a href="/frontend/signup.html">회원가입</a></p>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        // 이미 로그인된 경우 메인 페이지로 리다이렉트
        if (isLoggedIn()) {
            window.location.href = '/frontend/main.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const token = await apiPost('/users/login', { email, password });

                // 토큰 유효성 검증
                if (!token || token === 'undefined' || typeof token !== 'string') {
                    throw new Error('로그인에 실패했습니다. 이메일과 비밀번호를 확인해주세요.');
                }

                // 토큰 저장
                saveToken(token);

                alert('로그인 성공!');
                window.location.href = '/frontend/main.html';
            } catch (error) {
                alert('로그인 실패: ' + error.message);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKBO - 마이페이지</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/team-theme.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/frontend/main.html" style="text-decoration: none; color: inherit;">
                <div class="logo">⚾ OKBO</div>
            </a>
            <nav></nav>
        </div>
    </header>

    <div class="container">
        <div class="mypage-layout">
            <!-- 왼쪽 사이드바 -->
            <div class="mypage-sidebar">
                <!-- 프로필 카드 -->
                <div class="card">
                    <div id="myProfile">
                        <div class="loading">프로필을 불러오는 중...</div>
                    </div>
                </div>

                <!-- 내 응원팀 -->
                <h3 class="section-title">내 응원팀</h3>
                <div class="team-info-card" id="teamInfoCard">
                    <div class="loading">팀 정보를 불러오는 중...</div>
                </div>
                <div style="margin-top: 8px; font-size: 11px; color: #999; text-align: left;">
                    ※ 2025년 10월 04일 정규시즌 기준
                </div>

                <!-- 계정 관리 -->
                <h3 class="section-title">계정 관리</h3>
                <div class="card">
                    <div class="account-menu">
                        <div class="account-menu-item" onclick="showNicknameForm()">
                            <span>⚙️</span> 닉네임 변경
                        </div>
                        <div class="account-menu-item" onclick="showPasswordForm()">
                            <span>🔒</span> 비밀번호 변경
                        </div>
                        <div class="account-menu-item" onclick="showDeleteForm()">
                            <span>↪️</span> 회원 탈퇴
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽 메인 영역 -->
            <div class="mypage-main">
                <!-- 내가 쓴 글 -->
                <div class="my-posts-section" id="myPostsSection">
                    <div class="my-posts-header">
                        <h2>내가 쓴 글</h2>
                        <span class="post-count-badge" id="postCountBadge">총 0개</span>
                    </div>

                    <!-- 검색 필터 -->
                    <div class="search-container">
                        <!-- 기간 검색 -->
                        <div class="search-row">
                            <label class="search-label">기간검색</label>
                            <input type="date" id="myStartDate">
                            <span style="margin: 0 5px;">~</span>
                            <input type="date" id="myEndDate">
                            <div class="date-quick-buttons">
                                <button class="date-btn" onclick="setMyDateRange(30)">1개월</button>
                                <button class="date-btn" onclick="setMyDateRange(180)">6개월</button>
                                <button class="date-btn" onclick="setMyDateRange(365)">1년</button>
                            </div>
                        </div>

                        <!-- 검색 조건 -->
                        <div class="search-row">
                            <label class="search-label">검색조건</label>
                            <select id="mySearchType" class="search-select">
                                <option value="title">제목</option>
                            </select>
                            <input type="text" id="mySearchKeyword" placeholder="검색어를 입력하세요" style="flex: 1;">
                            <button class="btn btn-primary search-btn-custom" onclick="searchMyBoards()">검색</button>
                            <button class="btn btn-secondary search-btn-custom" onclick="resetMySearch()">초기화</button>
                        </div>
                    </div>

                    <!-- 정렬 -->
                    <div class="filter-sort-container">
                        <div class="sort-buttons">
                            <span style="font-weight: 500; color: #333;">정렬 : </span>
                            <span class="sort-btn" onclick="setMySortBy('title')" data-sort="title">
                                제목 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn active" onclick="setMySortBy('createdAt')" data-sort="createdAt">
                                생성일 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setMySortBy('modifiedAt')" data-sort="modifiedAt">
                                수정일 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setMySortBy('likes')" data-sort="likes">
                                좋아요 수 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setMySortBy('comments')" data-sort="comments">
                                댓글 수 <span class="sort-arrow">▼</span>
                            </span>
                        </div>
                    </div>

                    <div id="myBoardList">
                        <div class="loading">게시글을 불러오는 중...</div>
                    </div>
                    <div class="pagination" id="myBoardPagination"></div>
                </div>

                <!-- 팔로우 리스트 섹션 -->
                <div class="my-posts-section" id="followListSection" style="display: none;">
                    <div class="my-posts-header">
                        <h2 id="followListTitle">팔로우 목록</h2>
                        <button class="btn btn-secondary" onclick="hideFollowList()" style="padding: 8px 16px;">← 내 게시글로 돌아가기</button>
                    </div>
                    <div id="followListContent" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>

        <!-- 닉네임 변경 모달 -->
        <div id="nicknameModal" class="modal-overlay" onclick="closeModalOnBackdrop(event, 'nicknameModal')">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="hideNicknameForm()">×</button>
                <h3>닉네임 변경</h3>
                <form id="nicknameForm">
                    <div class="form-group">
                        <input type="text" id="newNickname" placeholder="새 닉네임 (최대 10자)" maxlength="10" required>
                    </div>
                    <div class="flex gap-10">
                        <button type="submit" class="btn btn-primary">변경</button>
                        <button type="button" class="btn btn-secondary" onclick="hideNicknameForm()">취소</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 비밀번호 변경 모달 -->
        <div id="passwordModal" class="modal-overlay" onclick="closeModalOnBackdrop(event, 'passwordModal')">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="hidePasswordForm()">×</button>
                <h3>비밀번호 변경</h3>
                <form id="passwordForm">
                    <div class="form-group">
                        <input type="password" id="oldPassword" placeholder="현재 비밀번호" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="newPassword" placeholder="새 비밀번호" required>
                    </div>
                    <div class="flex gap-10">
                        <button type="submit" class="btn btn-primary">변경</button>
                        <button type="button" class="btn btn-secondary" onclick="hidePasswordForm()">취소</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 회원 탈퇴 모달 -->
        <div id="deleteModal" class="modal-overlay" onclick="closeModalOnBackdrop(event, 'deleteModal')">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="hideDeleteForm()">×</button>
                <h3>회원 탈퇴</h3>
                <p style="color: #e74c3c; margin-bottom: 15px;">탈퇴 시 모든 데이터가 삭제됩니다.</p>
                <form id="deleteForm">
                    <div class="form-group">
                        <input type="password" id="deletePassword" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <div class="flex gap-10">
                        <button type="submit" class="btn btn-danger">회원 탈퇴</button>
                        <button type="button" class="btn btn-secondary" onclick="hideDeleteForm()">취소</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        requireAuth();

        // KBO 팀 통계 데이터 (2025.10.04 기준)
        // 출처: https://www.koreabaseball.com/Record/TeamRank/TeamRankDaily.aspx
        const teamStats = {
            'LG': { rank: 1, wins: 85, losses: 56, draws: 3, winRate: 60.3 },
            'HANHWA': { rank: 2, wins: 83, losses: 57, draws: 4, winRate: 59.3 },
            'SSG': { rank: 3, wins: 75, losses: 65, draws: 4, winRate: 53.6 },
            'SAMSUNG': { rank: 4, wins: 74, losses: 68, draws: 2, winRate: 52.1 },
            'NC': { rank: 5, wins: 71, losses: 67, draws: 6, winRate: 51.4 },
            'KT': { rank: 6, wins: 71, losses: 68, draws: 5, winRate: 51.1 },
            'LOTTE': { rank: 7, wins: 66, losses: 72, draws: 6, winRate: 47.8 },
            'KIA': { rank: 8, wins: 65, losses: 75, draws: 4, winRate: 46.4 },
            'DOOSAN': { rank: 9, wins: 61, losses: 77, draws: 6, winRate: 44.2 },
            'KIWOOM': { rank: 10, wins: 47, losses: 93, draws: 4, winRate: 33.6 }
        };

        let currentFollowingCount = 0;
        let currentFollowerCount = 0;
        let currentUserTeam = null; // 현재 사용자의 팀

        // 내 게시글 정렬 상태
        let myCurrentSort = 'createdAt';
        let myCurrentOrder = 'desc';

        // 내 프로필 로드
        async function loadMyProfile() {
            try {
                const data = await apiGet('/users/my-page');
                const followData = await apiGet('/follows/follow-count');
                currentFollowingCount = followData.following;
                currentFollowerCount = followData.follower;
                displayProfile(data, followData);

                // 백엔드는 teamName 필드로 한글 이름을 반환 (예: "한화 이글스")
                // 이를 enum으로 변환 (예: "HANHWA")
                const teamEnum = getTeamEnumFromName(data.teamName);
                currentUserTeam = teamEnum;

                // 페이지 전체에 팀 테마 적용
                applyTeamTheme(teamEnum);

                displayTeamInfo(teamEnum);
            } catch (error) {
                document.getElementById('myProfile').innerHTML =
                    `<div class="alert alert-error">프로필을 불러오는데 실패했습니다: ${error.message}</div>`;
            }
        }

        // 프로필 표시
        function displayProfile(data, followData) {
            document.getElementById('myProfile').innerHTML = `
                <h2 class="profile-nickname">${data.nickname}님</h2>
                <p class="profile-email">${data.email}</p>
                <div class="profile-stats">
                    <div class="profile-stat" onclick="showFollowingList()" style="cursor: pointer;">
                        <div class="stat-number">${followData.following}</div>
                        <div class="stat-label">팔로잉</div>
                    </div>
                    <div class="profile-stat" onclick="showFollowerList()" style="cursor: pointer;">
                        <div class="stat-number">${followData.follower}</div>
                        <div class="stat-label">팔로워</div>
                    </div>
                </div>
            `;
        }

        // 팀 테마 적용 함수
        function applyTeamTheme(teamEnum) {
            // body에 data-team 속성 추가 (헤더 색상 적용)
            document.body.setAttribute('data-team', teamEnum);

            // 컨테이너에 data-team 속성 추가
            const container = document.querySelector('.container');
            if (container) {
                container.setAttribute('data-team', teamEnum);
            }

            // 팀 정보 카드에 data-team 속성 추가
            const teamInfoCard = document.getElementById('teamInfoCard');
            if (teamInfoCard) {
                teamInfoCard.setAttribute('data-team', teamEnum);
            }

            // 팀 배지들에 data-team 속성 추가
            document.querySelectorAll('.team-badge').forEach(badge => {
                badge.setAttribute('data-team', teamEnum);
            });
        }

        // 팀 정보 표시
        function displayTeamInfo(team) {
            console.log('받은 팀 정보:', team); // 디버깅용
            console.log('사용 가능한 팀들:', Object.keys(teamStats)); // 디버깅용

            const stats = teamStats[team];
            if (!stats) {
                console.error('팀 정보를 찾을 수 없음:', team);
                document.getElementById('teamInfoCard').innerHTML =
                    `<p style="color: #fff; text-align: center;">팀 정보를 불러올 수 없습니다. (팀: ${team})</p>`;
                return;
            }

            const fullTeamName = getFullTeamName(team);
            const logoPath = `/frontend/images/logos/${team.toLowerCase()}.svg`;

            document.getElementById('teamInfoCard').innerHTML = `
                <div class="team-header">
                    <img src="${logoPath}"
                         alt="${fullTeamName}"
                         class="team-logo-small"
                         onerror="handleTeamLogoError(this, '${team}')">
                    <h3>${fullTeamName}</h3>
                </div>
                <div class="team-stats-row">
                    <div class="team-stat-column">
                        <div class="team-stat-label">순위</div>
                        <div class="team-stat-value">${stats.rank}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">승</div>
                        <div class="team-stat-value">${stats.wins}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">패</div>
                        <div class="team-stat-value">${stats.losses}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">무</div>
                        <div class="team-stat-value">${stats.draws}</div>
                    </div>
                </div>
            `;
        }

        // 팔로잉 목록 표시
        async function showFollowingList() {
            try {
                const data = await apiGet('/follows/following?page=0&size=20');
                document.getElementById('followListTitle').textContent = '팔로잉 목록';
                document.getElementById('followListContent').innerHTML = data.content.map(user => `
                    <div class="comment-item">
                        <div class="flex-between">
                            <div>
                                <strong class="author-link" style="cursor: pointer;" onclick="goToUserProfile('${user.nickname}')">${user.nickname}</strong>
                                <span class="team-badge" style="margin-left: 10px;">${user.favoriteTeam}</span>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="unfollowUser('${user.nickname}')">언팔로우</button>
                        </div>
                    </div>
                `).join('');

                // 게시글 섹션 숨기고 팔로우 리스트 섹션 표시
                document.getElementById('myPostsSection').style.display = 'none';
                document.getElementById('followListSection').style.display = 'block';
            } catch (error) {
                alert('목록 조회 실패: ' + error.message);
            }
        }

        // 팔로워 목록 표시
        async function showFollowerList() {
            try {
                const data = await apiGet('/follows/follower?page=0&size=20');
                document.getElementById('followListTitle').textContent = '팔로워 목록';
                document.getElementById('followListContent').innerHTML = data.content.map(user => `
                    <div class="comment-item">
                        <div class="flex-between">
                            <div>
                                <strong class="author-link" style="cursor: pointer;" onclick="goToUserProfile('${user.nickname}')">${user.nickname}</strong>
                                <span class="team-badge" style="margin-left: 10px;">${user.favoriteTeam}</span>
                            </div>
                        </div>
                    </div>
                `).join('');

                // 게시글 섹션 숨기고 팔로우 리스트 섹션 표시
                document.getElementById('myPostsSection').style.display = 'none';
                document.getElementById('followListSection').style.display = 'block';
            } catch (error) {
                alert('목록 조회 실패: ' + error.message);
            }
        }

        // 목록 숨기기 (게시글 섹션으로 돌아가기)
        function hideFollowList() {
            document.getElementById('followListSection').style.display = 'none';
            document.getElementById('myPostsSection').style.display = 'block';
        }

        // 팔로우 정보 다시 로드
        async function loadFollowInfo() {
            try {
                const followData = await apiGet('/follows/follow-count');
                currentFollowingCount = followData.following;
                currentFollowerCount = followData.follower;

                // 프로필에 팔로우 수 업데이트
                const profileData = await apiGet('/users/my-page');
                displayProfile(profileData, followData);
            } catch (error) {
                console.error('팔로우 정보 로드 실패:', error);
            }
        }

        // 언팔로우
        async function unfollowUser(nickname) {
            try {
                await apiDelete(`/follows/${nickname}`);
                alert('언팔로우 했습니다.');
                showFollowingList();
                loadFollowInfo();
            } catch (error) {
                alert('언팔로우 실패: ' + error.message);
            }
        }

        // 내가 작성한 게시글 로드 (검색/정렬 포함)
        async function loadMyBoards(page = 0) {
            try {
                const title = document.getElementById('mySearchKeyword')?.value || '';
                const startDate = document.getElementById('myStartDate')?.value.replace(/-/g, '') || '';
                const endDate = document.getElementById('myEndDate')?.value.replace(/-/g, '') || '';

                const params = {
                    page,
                    size: 10,
                    sort: `${myCurrentSort},${myCurrentOrder}`
                };

                // 검색 조건 추가
                if (title) params.title = title;
                if (startDate) params.startDate = startDate;
                if (endDate) params.endDate = endDate;

                const data = await apiGet('/boards/my-board' + buildQueryParams(params));
                displayMyBoards(data);
            } catch (error) {
                document.getElementById('myBoardList').innerHTML =
                    `<div class="alert alert-error">게시글을 불러오는데 실패했습니다: ${error.message}</div>`;
            }
        }

        // 내 게시글 검색
        async function searchMyBoards() {
            loadMyBoards(0);
        }

        // 내 게시글 검색 초기화
        function resetMySearch() {
            // 입력 필드 초기화
            document.getElementById('myStartDate').value = '';
            document.getElementById('myEndDate').value = '';
            document.getElementById('mySearchKeyword').value = '';

            // 정렬 초기화
            myCurrentSort = 'createdAt';
            myCurrentOrder = 'desc';

            // 정렬 버튼 UI 초기화
            document.querySelectorAll('.my-posts-section .sort-btn').forEach(btn => {
                btn.classList.remove('active');
                const arrow = btn.querySelector('.sort-arrow');
                arrow.textContent = '▼';
            });

            const defaultSortBtn = document.querySelector('.my-posts-section .sort-btn[data-sort="createdAt"]');
            if (defaultSortBtn) {
                defaultSortBtn.classList.add('active');
            }

            // 게시글 다시 로드
            loadMyBoards(0);
        }

        // 내 게시글 빠른 날짜 설정
        function setMyDateRange(days) {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - days);

            document.getElementById('myStartDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('myEndDate').value = endDate.toISOString().split('T')[0];
        }

        // 내 게시글 정렬
        function setMySortBy(sortField) {
            // 같은 필드를 다시 클릭하면 정렬 방향 토글
            if (myCurrentSort === sortField) {
                myCurrentOrder = myCurrentOrder === 'desc' ? 'asc' : 'desc';
            } else {
                myCurrentSort = sortField;
                myCurrentOrder = 'desc';
            }

            // 모든 버튼에서 active 클래스 제거
            document.querySelectorAll('.my-posts-section .sort-btn').forEach(btn => {
                btn.classList.remove('active');
                const arrow = btn.querySelector('.sort-arrow');
                arrow.textContent = '▼';
            });

            // 선택된 버튼에 active 클래스 추가
            const activeBtn = document.querySelector(`.my-posts-section .sort-btn[data-sort="${sortField}"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                const arrow = activeBtn.querySelector('.sort-arrow');
                arrow.textContent = myCurrentOrder === 'desc' ? '▼' : '▲';
            }

            // 게시글 다시 로드
            loadMyBoards(0);
        }

        // 내 게시글 표시 (테이블 형태)
        function displayMyBoards(data) {
            const boardList = document.getElementById('myBoardList');
            const postCountBadge = document.getElementById('postCountBadge');

            // 게시글 개수 업데이트
            postCountBadge.textContent = `총 ${data.totalElements}개`;

            if (!data.content || data.content.length === 0) {
                boardList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚾</div>
                        <p>작성한 게시글이 없습니다.</p>
                    </div>
                `;
                document.getElementById('myBoardPagination').innerHTML = '';
                return;
            }

            // 게시글 테이블 생성
            boardList.innerHTML = `
                <table class="board-table">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>제목</th>
                            <th>구단</th>
                            <th>작성일</th>
                            <th>좋아요</th>
                            <th>댓글</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.content.map(board => `
                            <tr>
                                <td>${board.id}</td>
                                <td class="title-cell">
                                    <a href="/frontend/board-detail.html?id=${board.id}">
                                        ${board.title}
                                    </a>
                                </td>
                                <td>${getTeamName(board.team)}</td>
                                <td>${formatDate(board.createdAt)}</td>
                                <td>${board.likes}</td>
                                <td>${board.comments}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            // 페이지네이션
            createMyPagination(data);
        }

        // 내 게시글 페이지네이션
        function createMyPagination(data) {
            const pagination = document.getElementById('myBoardPagination');
            const totalPages = data.totalPages;
            const currentPage = data.number;

            let html = '';
            html += `<button onclick="loadMyBoards(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>이전</button>`;

            for (let i = 0; i < totalPages; i++) {
                html += `<button onclick="loadMyBoards(${i})" ${i === currentPage ? 'class="active"' : ''}>${i + 1}</button>`;
            }

            html += `<button onclick="loadMyBoards(${currentPage + 1})" ${currentPage === totalPages - 1 ? 'disabled' : ''}>다음</button>`;
            pagination.innerHTML = html;
        }

        // 모달 표시/숨김 함수들
        function showNicknameForm() {
            document.getElementById('nicknameModal').classList.add('active');
        }

        function hideNicknameForm() {
            document.getElementById('nicknameModal').classList.remove('active');
            document.getElementById('newNickname').value = '';
        }

        function showPasswordForm() {
            document.getElementById('passwordModal').classList.add('active');
        }

        function hidePasswordForm() {
            document.getElementById('passwordModal').classList.remove('active');
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
        }

        function showDeleteForm() {
            document.getElementById('deleteModal').classList.add('active');
        }

        function hideDeleteForm() {
            document.getElementById('deleteModal').classList.remove('active');
            document.getElementById('deletePassword').value = '';
        }

        // 배경 클릭 시 모달 닫기
        function closeModalOnBackdrop(event, modalId) {
            if (event.target.id === modalId) {
                document.getElementById(modalId).classList.remove('active');
            }
        }

        // 닉네임 변경
        document.getElementById('nicknameForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newNickname = document.getElementById('newNickname').value;

            try {
                await apiPut('/users/nickname', { nickname: newNickname });
                alert('닉네임이 변경되었습니다.');
                hideNicknameForm();
                loadMyProfile();
            } catch (error) {
                alert('닉네임 변경 실패: ' + error.message);
            }
        });

        // 비밀번호 변경
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            try {
                await apiPut('/users/password', { currentPassword: oldPassword, newPassword });
                alert('비밀번호가 변경되었습니다.');
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                hidePasswordForm();
            } catch (error) {
                alert('비밀번호 변경 실패: ' + error.message);
            }
        });

        // 회원 탈퇴
        document.getElementById('deleteForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!confirm('정말로 탈퇴하시겠습니까? 모든 데이터가 삭제됩니다.')) return;

            const password = document.getElementById('deletePassword').value;

            try {
                await apiDelete('/users', { password });
                alert('회원 탈퇴가 완료되었습니다.');
                logout();
            } catch (error) {
                alert('회원 탈퇴 실패: ' + error.message);
            }
        });

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ko-KR');
        }

        // 팀 로고 이미지 로드 실패 처리
        function handleTeamLogoError(imgElement, team) {
            console.warn(`팀 로고 로드 실패: ${team}`);

            // 이미지 숨김 (아무것도 표시하지 않음)
            imgElement.style.display = 'none';
        }

        // 유저 프로필로 이동
        async function goToUserProfile(nickname) {
            // 로그인한 경우 자기 자신인지 확인
            try {
                const myData = await apiGet('/users/my-page');
                if (myData.nickname === nickname) {
                    // 자기 자신이면 마이페이지로 (이미 마이페이지이므로 새로고침)
                    window.location.href = '/frontend/mypage.html';
                    return;
                }
            } catch (error) {
                console.error('사용자 정보 확인 실패:', error);
            }
            // 다른 사람이면 프로필 페이지로
            window.location.href = `/frontend/user-profile.html?nickname=${encodeURIComponent(nickname)}`;
        }

        // 페이지 로드
        loadMyProfile();
        loadFollowInfo();
        loadMyBoards();
    </script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKBO - 게시글 수정</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/frontend/main.html" style="text-decoration: none; color: inherit;">
                <div class="logo">⚾ OKBO</div>
            </a>
            <nav></nav>
        </div>
    </header>

    <div class="form-container" style="max-width: 800px;">
        <h2>게시글 수정</h2>
        <form id="boardForm">
            <div class="form-group">
                <label for="title">제목 (최대 30자)</label>
                <input type="text" id="title" name="title" required maxlength="30">
            </div>

            <div class="form-group">
                <label>구단</label>
                <p id="teamDisplay" style="padding: 10px; background-color: #f5f5f5; border-radius: 4px; margin: 0;"></p>
                <input type="hidden" id="team" name="team">
            </div>

            <div class="form-group">
                <label for="content">내용 (최대 225자)</label>
                <textarea id="content" name="content" required maxlength="225"></textarea>
            </div>

            <div class="flex gap-10">
                <button type="submit" class="btn btn-primary" style="flex: 1;">수정</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()" style="flex: 1;">취소</button>
            </div>
        </form>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        requireAuth();

        const boardId = new URLSearchParams(window.location.search).get('id');

        // 팀 이름을 Enum 값으로 변환
        function getTeamEnum(teamName) {
            const teamMap = {
                '두산 베어즈': 'DOOSAN',
                '한화 이글스': 'HANHWA',
                '기아 타이거즈': 'KIA',
                'KT 위즈': 'KT',
                '키움 히어로즈': 'KIWOOM',
                'LG 트윈스': 'LG',
                '롯데 자이언츠': 'LOTTE',
                'NC 다이노스': 'NC',
                '삼성 라이온즈': 'SAMSUNG',
                'SSG 랜더스': 'SSG'
            };
            return teamMap[teamName] || teamName;
        }

        // 기존 게시글 데이터 로드
        async function loadBoard() {
            try {
                const data = await apiGet(`/boards/board/${boardId}?page=0&size=1`);
                // data 자체가 게시글 정보

                document.getElementById('title').value = data.title;
                document.getElementById('team').value = getTeamEnum(data.team);
                document.getElementById('teamDisplay').textContent = data.team;
                document.getElementById('content').value = data.content;
            } catch (error) {
                alert('게시글을 불러오는데 실패했습니다: ' + error.message);
                history.back();
            }
        }

        // 게시글 수정 제출
        document.getElementById('boardForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const team = document.getElementById('team').value;
            const content = document.getElementById('content').value;

            try {
                await apiPut(`/boards/${boardId}`, {
                    title,
                    team,
                    content
                });

                alert('게시글이 수정되었습니다.');
                window.location.href = `/frontend/board-detail.html?id=${boardId}`;
            } catch (error) {
                alert('게시글 수정 실패: ' + error.message);
            }
        });

        // 페이지 로드 시 게시글 데이터 불러오기
        loadBoard();
    </script>
</body>
</html>

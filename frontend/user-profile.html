<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKBO - 유저 프로필</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚾</text></svg>">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/team-theme.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="/frontend/main.html" style="text-decoration: none; color: inherit;">
                <div class="logo">⚾ OKBO</div>
            </a>
            <nav></nav>
        </div>
    </header>

    <div class="container">
        <div class="mypage-layout">
            <!-- 왼쪽 사이드바 -->
            <div class="mypage-sidebar">
                <!-- 프로필 카드 -->
                <div class="card">
                    <div id="userProfile">
                        <div class="loading">프로필을 불러오는 중...</div>
                    </div>
                </div>

                <!-- 응원팀 -->
                <h3 class="section-title">응원팀</h3>
                <div class="team-info-card" id="teamInfoCard">
                    <div class="loading">팀 정보를 불러오는 중...</div>
                </div>
                <div style="margin-top: 8px; font-size: 11px; color: #999; text-align: left;">
                    ※ 2025년 10월 04일 정규시즌 기준
                </div>
            </div>

            <!-- 오른쪽 메인 영역 -->
            <div class="mypage-main">
                <!-- 유저가 쓴 글 -->
                <div class="my-posts-section" id="userPostsSection">
                    <div class="my-posts-header">
                        <h2><span id="userNicknameTitle"></span>님의 게시글</h2>
                        <span class="post-count-badge" id="postCountBadge">총 0개</span>
                    </div>

                    <!-- 검색 필터 -->
                    <div class="search-container">
                        <!-- 기간 검색 -->
                        <div class="search-row">
                            <label class="search-label">기간검색</label>
                            <input type="date" id="userStartDate">
                            <span style="margin: 0 5px;">~</span>
                            <input type="date" id="userEndDate">
                            <div class="date-quick-buttons">
                                <button class="date-btn" onclick="setUserDateRange(30)">1개월</button>
                                <button class="date-btn" onclick="setUserDateRange(180)">6개월</button>
                                <button class="date-btn" onclick="setUserDateRange(365)">1년</button>
                            </div>
                        </div>

                        <!-- 검색 조건 -->
                        <div class="search-row">
                            <label class="search-label">검색조건</label>
                            <select id="userSearchType" class="search-select">
                                <option value="title">제목</option>
                            </select>
                            <input type="text" id="userSearchKeyword" placeholder="검색어를 입력하세요" style="flex: 1;">
                            <button class="btn btn-primary search-btn-custom" onclick="searchUserBoards()">검색</button>
                            <button class="btn btn-secondary search-btn-custom" onclick="resetUserSearch()">초기화</button>
                        </div>
                    </div>

                    <!-- 정렬 -->
                    <div class="filter-sort-container">
                        <div class="sort-buttons">
                            <span style="font-weight: 500; color: #333;">정렬 : </span>
                            <span class="sort-btn" onclick="setUserSortBy('title')" data-sort="title">
                                제목 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn active" onclick="setUserSortBy('createdAt')" data-sort="createdAt">
                                생성일 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setUserSortBy('modifiedAt')" data-sort="modifiedAt">
                                수정일 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setUserSortBy('likes')" data-sort="likes">
                                좋아요 수 <span class="sort-arrow">▼</span>
                            </span>
                            <span style="color: #ddd;">|</span>
                            <span class="sort-btn" onclick="setUserSortBy('comments')" data-sort="comments">
                                댓글 수 <span class="sort-arrow">▼</span>
                            </span>
                        </div>
                    </div>

                    <div id="userBoardList">
                        <div class="loading">게시글을 불러오는 중...</div>
                    </div>
                    <div class="pagination" id="userBoardPagination"></div>
                </div>

                <!-- 팔로우 리스트 섹션 -->
                <div class="my-posts-section" id="followListSection" style="display: none;">
                    <div class="my-posts-header">
                        <h2 id="followListTitle">팔로우 목록</h2>
                        <button class="btn btn-secondary" onclick="hideFollowList()" style="padding: 8px 16px;">← 게시글로 돌아가기</button>
                    </div>
                    <div id="followListContent" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/auth.js"></script>
    <script>
        // URL에서 nickname 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const targetNickname = urlParams.get('nickname');

        if (!targetNickname) {
            alert('잘못된 접근입니다.');
            window.location.href = '/frontend/main.html';
        }

        // KBO 팀 통계 데이터 (2025.10.04 기준)
        const teamStats = {
            'LG': { rank: 1, wins: 85, losses: 56, draws: 3, winRate: 60.3 },
            'HANHWA': { rank: 2, wins: 83, losses: 57, draws: 4, winRate: 59.3 },
            'SSG': { rank: 3, wins: 75, losses: 65, draws: 4, winRate: 53.6 },
            'SAMSUNG': { rank: 4, wins: 74, losses: 68, draws: 2, winRate: 52.1 },
            'NC': { rank: 5, wins: 71, losses: 67, draws: 6, winRate: 51.4 },
            'KT': { rank: 6, wins: 71, losses: 68, draws: 5, winRate: 51.1 },
            'LOTTE': { rank: 7, wins: 66, losses: 72, draws: 6, winRate: 47.8 },
            'KIA': { rank: 8, wins: 65, losses: 75, draws: 4, winRate: 46.4 },
            'DOOSAN': { rank: 9, wins: 61, losses: 77, draws: 6, winRate: 44.2 },
            'KIWOOM': { rank: 10, wins: 47, losses: 93, draws: 4, winRate: 33.6 }
        };

        let currentFollowingCount = 0;
        let currentFollowerCount = 0;
        let currentUserTeam = null;
        let isFollowing = false; // 현재 로그인한 유저가 이 유저를 팔로우하고 있는지

        // 게시글 정렬 상태
        let userCurrentSort = 'createdAt';
        let userCurrentOrder = 'desc';

        // 로그인한 유저의 팀 테마 적용 (페이지 전체)
        async function applyMyTeamTheme() {
            if (isLoggedIn()) {
                try {
                    const myData = await apiGet('/users/my-page');
                    const myTeamEnum = getTeamEnumFromName(myData.teamName);

                    // 페이지 전체(body, container)에 로그인한 유저의 팀 테마 적용
                    document.body.setAttribute('data-team', myTeamEnum);
                    const container = document.querySelector('.container');
                    if (container) {
                        container.setAttribute('data-team', myTeamEnum);
                    }
                } catch (error) {
                    console.error('내 팀 테마 적용 실패:', error);
                }
            }
        }

        // 유저 프로필 로드
        async function loadUserProfile() {
            try {
                // 유저 정보 조회
                const data = await apiGet(`/users/${encodeURIComponent(targetNickname)}`);

                // 팔로우 수 조회
                const followData = await apiGet(`/follows/follow-count?userNickname=${encodeURIComponent(targetNickname)}`);
                currentFollowingCount = followData.following;
                currentFollowerCount = followData.follower;

                // 백엔드는 teamName 필드로 한글 이름을 반환 (예: "한화 이글스")
                // 이를 enum으로 변환 (예: "HANHWA")
                const teamEnum = getTeamEnumFromName(data.teamName);
                currentUserTeam = teamEnum;

                displayProfile(data, followData);
                displayTeamInfo(teamEnum);

                // 제목 업데이트
                document.getElementById('userNicknameTitle').textContent = data.nickname;

                // 팔로우 상태 확인 (로그인한 경우에만)
                if (isLoggedIn()) {
                    await checkFollowStatus();
                }
            } catch (error) {
                document.getElementById('userProfile').innerHTML =
                    `<div class="alert alert-error">프로필을 불러오는데 실패했습니다: ${error.message}</div>`;
            }
        }

        // 팔로우 상태 확인
        async function checkFollowStatus() {
            try {
                const followingData = await apiGet('/follows/following?page=0&size=1000');
                const followingList = followingData.content;
                isFollowing = followingList.some(user => user.nickname === targetNickname);
                updateFollowButton();
            } catch (error) {
                console.error('팔로우 상태 확인 실패:', error);
            }
        }

        // 프로필 표시
        function displayProfile(data, followData) {
            const followButton = isLoggedIn() ? `
                <button class="btn btn-primary" id="followButton" onclick="toggleFollow()" style="width: 100%; margin-top: 15px;">
                    팔로우
                </button>
            ` : '';

            document.getElementById('userProfile').innerHTML = `
                <h2 class="profile-nickname">${data.nickname}님</h2>
                <div class="profile-stats">
                    <div class="profile-stat" onclick="showFollowingList()" style="cursor: pointer;">
                        <div class="stat-number">${followData.following}</div>
                        <div class="stat-label">팔로잉</div>
                    </div>
                    <div class="profile-stat" onclick="showFollowerList()" style="cursor: pointer;">
                        <div class="stat-number">${followData.follower}</div>
                        <div class="stat-label">팔로워</div>
                    </div>
                </div>
                ${followButton}
            `;
        }

        // 팔로우 버튼 업데이트
        function updateFollowButton() {
            const followButton = document.getElementById('followButton');
            if (followButton) {
                if (isFollowing) {
                    followButton.textContent = '언팔로우';
                    followButton.classList.remove('btn-primary');
                    followButton.classList.add('btn-secondary');
                } else {
                    followButton.textContent = '팔로우';
                    followButton.classList.remove('btn-secondary');
                    followButton.classList.add('btn-primary');
                }
            }
        }

        // 팔로우/언팔로우 토글
        async function toggleFollow() {
            try {
                if (isFollowing) {
                    // 언팔로우
                    await apiDelete(`/follows/${encodeURIComponent(targetNickname)}`);
                    alert('언팔로우 했습니다.');
                    isFollowing = false;
                } else {
                    // 팔로우
                    await apiPost(`/follows/${encodeURIComponent(targetNickname)}`);
                    alert('팔로우 했습니다.');
                    isFollowing = true;
                }
                updateFollowButton();

                // 팔로우 수 다시 로드
                const followData = await apiGet(`/follows/follow-count?userNickname=${encodeURIComponent(targetNickname)}`);
                currentFollowingCount = followData.following;
                currentFollowerCount = followData.follower;

                // 프로필 다시 표시
                const userData = await apiGet(`/users/${encodeURIComponent(targetNickname)}`);
                displayProfile(userData, followData);
                updateFollowButton();
            } catch (error) {
                alert('팔로우 처리 실패: ' + error.message);
            }
        }

        // 팀 정보 표시 (팀 정보 박스에만 해당 유저의 팀 색상 적용)
        function displayTeamInfo(team) {
            const stats = teamStats[team];
            if (!stats) {
                console.error('팀 정보를 찾을 수 없음:', team);
                document.getElementById('teamInfoCard').innerHTML =
                    `<p style="color: #fff; text-align: center;">팀 정보를 불러올 수 없습니다. (팀: ${team})</p>`;
                return;
            }

            const fullTeamName = getFullTeamName(team);
            const logoPath = `/frontend/images/logos/${team.toLowerCase()}.svg`;

            // 팀 정보 카드에만 해당 유저의 팀 색상 적용
            const teamInfoCard = document.getElementById('teamInfoCard');
            if (teamInfoCard) {
                teamInfoCard.setAttribute('data-team', team);
            }

            document.getElementById('teamInfoCard').innerHTML = `
                <div class="team-header">
                    <img src="${logoPath}"
                         alt="${fullTeamName}"
                         class="team-logo-small"
                         onerror="handleTeamLogoError(this, '${team}')">
                    <h3>${fullTeamName}</h3>
                </div>
                <div class="team-stats-row">
                    <div class="team-stat-column">
                        <div class="team-stat-label">순위</div>
                        <div class="team-stat-value">${stats.rank}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">승</div>
                        <div class="team-stat-value">${stats.wins}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">패</div>
                        <div class="team-stat-value">${stats.losses}</div>
                    </div>
                    <div class="stats-separator"></div>
                    <div class="team-stat-column">
                        <div class="team-stat-label">무</div>
                        <div class="team-stat-value">${stats.draws}</div>
                    </div>
                </div>
            `;

            // 다시 data-team 속성 적용 (innerHTML로 내용이 교체되므로)
            if (teamInfoCard) {
                teamInfoCard.setAttribute('data-team', team);
            }
        }

        // 팔로잉 목록 표시
        async function showFollowingList() {
            try {
                const data = await apiGet(`/follows/following?userNickname=${encodeURIComponent(targetNickname)}&page=0&size=20`);
                document.getElementById('followListTitle').textContent = '팔로잉 목록';
                document.getElementById('followListContent').innerHTML = data.content.map(user => {
                    // 로그인 시 링크, 비로그인 시 텍스트만
                    const nicknameDisplay = isLoggedIn()
                        ? `<strong class="author-link" style="cursor: pointer;" onclick="goToUserProfile('${user.nickname}')">${user.nickname}</strong>`
                        : `<strong>${user.nickname}</strong>`;
                    return `
                    <div class="comment-item">
                        <div class="flex-between">
                            <div>
                                ${nicknameDisplay}
                                <span class="team-badge" style="margin-left: 10px;">${user.favoriteTeam}</span>
                            </div>
                        </div>
                    </div>
                `}).join('');

                // 게시글 섹션 숨기고 팔로우 리스트 섹션 표시
                document.getElementById('userPostsSection').style.display = 'none';
                document.getElementById('followListSection').style.display = 'block';
            } catch (error) {
                alert('목록 조회 실패: ' + error.message);
            }
        }

        // 팔로워 목록 표시
        async function showFollowerList() {
            try {
                const data = await apiGet(`/follows/follower?userNickname=${encodeURIComponent(targetNickname)}&page=0&size=20`);
                document.getElementById('followListTitle').textContent = '팔로워 목록';
                document.getElementById('followListContent').innerHTML = data.content.map(user => {
                    // 로그인 시 링크, 비로그인 시 텍스트만
                    const nicknameDisplay = isLoggedIn()
                        ? `<strong class="author-link" style="cursor: pointer;" onclick="goToUserProfile('${user.nickname}')">${user.nickname}</strong>`
                        : `<strong>${user.nickname}</strong>`;
                    return `
                    <div class="comment-item">
                        <div class="flex-between">
                            <div>
                                ${nicknameDisplay}
                                <span class="team-badge" style="margin-left: 10px;">${user.favoriteTeam}</span>
                            </div>
                        </div>
                    </div>
                `}).join('');

                // 게시글 섹션 숨기고 팔로우 리스트 섹션 표시
                document.getElementById('userPostsSection').style.display = 'none';
                document.getElementById('followListSection').style.display = 'block';
            } catch (error) {
                alert('목록 조회 실패: ' + error.message);
            }
        }

        // 유저 프로필로 이동
        async function goToUserProfile(nickname) {
            // 로그인한 경우 자기 자신인지 확인
            if (isLoggedIn()) {
                try {
                    const myData = await apiGet('/users/my-page');
                    if (myData.nickname === nickname) {
                        // 자기 자신이면 마이페이지로
                        window.location.href = '/frontend/mypage.html';
                        return;
                    }
                } catch (error) {
                    console.error('사용자 정보 확인 실패:', error);
                }
            }
            // 다른 사람이면 프로필 페이지로
            window.location.href = `/frontend/user-profile.html?nickname=${encodeURIComponent(nickname)}`;
        }

        // 목록 숨기기 (게시글 섹션으로 돌아가기)
        function hideFollowList() {
            document.getElementById('followListSection').style.display = 'none';
            document.getElementById('userPostsSection').style.display = 'block';
        }

        // 유저가 작성한 게시글 로드 (검색/정렬 포함)
        async function loadUserBoards(page = 0) {
            try {
                const title = document.getElementById('userSearchKeyword')?.value || '';
                const startDate = document.getElementById('userStartDate')?.value.replace(/-/g, '') || '';
                const endDate = document.getElementById('userEndDate')?.value.replace(/-/g, '') || '';

                const params = {
                    writer: targetNickname,
                    page,
                    size: 10,
                    sort: `${userCurrentSort},${userCurrentOrder}`
                };

                // 검색 조건 추가
                if (title) params.title = title;
                if (startDate) params.startDate = startDate;
                if (endDate) params.endDate = endDate;

                const data = await apiGet('/boards' + buildQueryParams(params));
                displayUserBoards(data);
            } catch (error) {
                document.getElementById('userBoardList').innerHTML =
                    `<div class="alert alert-error">게시글을 불러오는데 실패했습니다: ${error.message}</div>`;
            }
        }

        // 유저 게시글 검색
        async function searchUserBoards() {
            loadUserBoards(0);
        }

        // 유저 게시글 검색 초기화
        function resetUserSearch() {
            document.getElementById('userStartDate').value = '';
            document.getElementById('userEndDate').value = '';
            document.getElementById('userSearchKeyword').value = '';

            userCurrentSort = 'createdAt';
            userCurrentOrder = 'desc';

            document.querySelectorAll('.my-posts-section .sort-btn').forEach(btn => {
                btn.classList.remove('active');
                const arrow = btn.querySelector('.sort-arrow');
                arrow.textContent = '▼';
            });

            const defaultSortBtn = document.querySelector('.my-posts-section .sort-btn[data-sort="createdAt"]');
            if (defaultSortBtn) {
                defaultSortBtn.classList.add('active');
            }

            loadUserBoards(0);
        }

        // 유저 게시글 빠른 날짜 설정
        function setUserDateRange(days) {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(endDate.getDate() - days);

            document.getElementById('userStartDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('userEndDate').value = endDate.toISOString().split('T')[0];
        }

        // 유저 게시글 정렬
        function setUserSortBy(sortField) {
            if (userCurrentSort === sortField) {
                userCurrentOrder = userCurrentOrder === 'desc' ? 'asc' : 'desc';
            } else {
                userCurrentSort = sortField;
                userCurrentOrder = 'desc';
            }

            document.querySelectorAll('.my-posts-section .sort-btn').forEach(btn => {
                btn.classList.remove('active');
                const arrow = btn.querySelector('.sort-arrow');
                arrow.textContent = '▼';
            });

            const activeBtn = document.querySelector(`.my-posts-section .sort-btn[data-sort="${sortField}"]`);
            if (activeBtn) {
                activeBtn.classList.add('active');
                const arrow = activeBtn.querySelector('.sort-arrow');
                arrow.textContent = userCurrentOrder === 'desc' ? '▼' : '▲';
            }

            loadUserBoards(0);
        }

        // 유저 게시글 표시 (테이블 형태)
        function displayUserBoards(data) {
            const boardList = document.getElementById('userBoardList');
            const postCountBadge = document.getElementById('postCountBadge');

            postCountBadge.textContent = `총 ${data.totalElements}개`;

            if (!data.content || data.content.length === 0) {
                boardList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚾</div>
                        <p>작성한 게시글이 없습니다.</p>
                    </div>
                `;
                document.getElementById('userBoardPagination').innerHTML = '';
                return;
            }

            boardList.innerHTML = `
                <table class="board-table">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>제목</th>
                            <th>구단</th>
                            <th>작성일</th>
                            <th>좋아요</th>
                            <th>댓글</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.content.map(board => `
                            <tr>
                                <td>${board.id}</td>
                                <td class="title-cell">
                                    <a href="/frontend/board-detail.html?id=${board.id}">
                                        ${board.title}
                                    </a>
                                </td>
                                <td>${getTeamName(board.team)}</td>
                                <td>${formatDate(board.createdAt)}</td>
                                <td>${board.likes}</td>
                                <td>${board.comments}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            createUserPagination(data);
        }

        // 유저 게시글 페이지네이션
        function createUserPagination(data) {
            const pagination = document.getElementById('userBoardPagination');
            const totalPages = data.totalPages;
            const currentPage = data.number;

            let html = '';
            html += `<button onclick="loadUserBoards(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>이전</button>`;

            for (let i = 0; i < totalPages; i++) {
                html += `<button onclick="loadUserBoards(${i})" ${i === currentPage ? 'class="active"' : ''}>${i + 1}</button>`;
            }

            html += `<button onclick="loadUserBoards(${currentPage + 1})" ${currentPage === totalPages - 1 ? 'disabled' : ''}>다음</button>`;
            pagination.innerHTML = html;
        }

        // 유틸리티 함수
        function getTeamName(team) {
            const teamNames = {
                'DOOSAN': '두산', 'HANHWA': '한화', 'KIA': '기아', 'KT': 'KT',
                'KIWOOM': '키움', 'LG': 'LG', 'LOTTE': '롯데', 'NC': 'NC',
                'SAMSUNG': '삼성', 'SSG': 'SSG'
            };
            return teamNames[team] || team;
        }

        function getFullTeamName(team) {
            const fullTeamNames = {
                'DOOSAN': '두산 베어즈',
                'HANHWA': '한화 이글스',
                'KIA': 'KIA 타이거즈',
                'KT': 'KT Wiz',
                'KIWOOM': '키움 히어로즈',
                'LG': 'LG 트윈스',
                'LOTTE': '롯데 자이언츠',
                'NC': 'NC 다이노스',
                'SAMSUNG': '삼성 라이온즈',
                'SSG': 'SSG 랜더스'
            };
            return fullTeamNames[team] || team;
        }

        function getTeamEnumFromName(teamName) {
            const teamEnumMap = {
                '두산 베어즈': 'DOOSAN',
                '한화 이글스': 'HANHWA',
                '기아 타이거즈': 'KIA',
                'KT 위즈': 'KT',
                '키움 히어로즈': 'KIWOOM',
                'LG 트윈스': 'LG',
                '롯데 자이언츠': 'LOTTE',
                'NC 다이노스': 'NC',
                '삼성 라이온즈': 'SAMSUNG',
                'SSG 랜더스': 'SSG'
            };
            return teamEnumMap[teamName] || teamName;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ko-KR');
        }

        function handleTeamLogoError(imgElement, team) {
            console.warn(`팀 로고 로드 실패: ${team}`);
            imgElement.style.display = 'none';
        }

        // 헤더 업데이트
        updateHeader();

        // 페이지 로드
        (async function initializePage() {
            // 0. 로그인한 경우 자기 자신의 프로필인지 확인
            if (isLoggedIn()) {
                try {
                    const myData = await apiGet('/users/my-page');
                    if (myData.nickname === targetNickname) {
                        // 자기 자신의 프로필이면 마이페이지로 리다이렉트
                        window.location.href = '/frontend/mypage.html';
                        return;
                    }
                } catch (error) {
                    console.error('사용자 정보 확인 실패:', error);
                }
            }

            // 1. 먼저 로그인한 유저의 팀 테마 적용 (페이지 전체)
            await applyMyTeamTheme();

            // 2. 대상 유저 프로필 로드 (팀 정보 박스만 해당 유저 팀 색상)
            await loadUserProfile();

            // 3. 대상 유저의 게시글 로드
            loadUserBoards();
        })();
    </script>
